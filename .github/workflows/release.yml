name: Release to Hex

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match mix.exs, e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (build but don't publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Publish v${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Verify version matches mix.exs
        run: |
          MIX_VERSION=$(grep '@version "' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$MIX_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Input version (${{ inputs.version }}) does not match mix.exs version ($MIX_VERSION)"
            exit 1
          fi

      - run: mix deps.get

      - name: Build hex package
        run: mix hex.build
        env:
          MIX_ENV: prod

      - name: Publish to Hex
        if: ${{ !inputs.dry_run }}
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        run: gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
